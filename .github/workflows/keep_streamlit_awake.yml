name: Keep Streamlit Awake

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  ping-streamlit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Streamlit app
        run: |
          curl --fail --silent --show-error --location \
            --max-time 60 \
            --retry 3 \
            --retry-delay 5 \
            "https://ga4-audit.streamlit.app/" > /dev/null
