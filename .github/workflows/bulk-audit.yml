name: Bulk Audit

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: Supabase bulk_audit_jobs.job_id to process
        required: true
        type: string

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    env:
      NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
      GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
      GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      SHEETS_SPREADSHEET_ID: ${{ secrets.SHEETS_SPREADSHEET_ID }}
      SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
      BULK_JOBS_WORKSHEET_NAME: ${{ secrets.BULK_JOBS_WORKSHEET_NAME }}
      BULK_RESULTS_WORKSHEET_NAME: ${{ secrets.BULK_RESULTS_WORKSHEET_NAME }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Set up ChromeDriver
        uses: nanasess/setup-chromedriver@v2

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bulk audit worker
        env:
          CHROME_BINARY: ${{ steps.setup-chrome.outputs.chrome-path }}
        run: python bulk_audit_worker.py --job-id "${{ inputs.job_id }}"
